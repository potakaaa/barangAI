project_id = "lihokbarangai"

[api]
enabled = true
port = 54321
schemas = ["public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[studio]
enabled = true
port = 54323

[inbucket]
enabled = true
port = 54324

[storage]
enabled = true

[auth]
enabled = true
site_url = "http://localhost:3000"
additional_redirect_urls = ["https://localhost:3000"]
jwt_expiry = 3600
enable_refresh_token_rotation = true

[functions.ingest]
verify_jwt = false   # Telegram webhook does not send a Supabase JWT
                     # Auth is handled manually via x-telegram-bot-api-secret-token header

[functions.cluster-batch]
verify_jwt = false   # Triggered internally via pg_cron, auth handled via TELEGRAM_WEBHOOK_SECRET header

[functions.broadcast]
verify_jwt = false
