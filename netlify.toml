[build]
  base = "apps/web"
  command = "pnpm install --frozen-lockfile && vite build"
  publish = "dist/client"

[build.environment]
  NODE_VERSION = "22"
  ENVIRONMENT = "development"
  SECRETS_SCAN_OMIT_KEYS = "ENVIRONMENT, SUPABASE_PROJECT_REF, SUPABASE_URL"
  SECRETS_SCAN_OMIT_PATHS = "**/dist/**"
